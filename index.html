<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Loja de camisetas - catálago, filtro e carrinho de compras">
    <title>T-shirts and more</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./estilo/style.css">
</head>

<body class="show-cart">
    <div class="container">
                <!-- Loader do catálogo -->
                <div id="catalog-loader" class="catalog-loader" aria-hidden="true" hidden>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
        <header>
            <div class="titulo">Lista de produtos</div>
            <div class="icone-cart">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312" />
                </svg>
                <span id="cart-count">0</span>
            </div>
        </header>
        <div class="lista-produtos">
            <div class="item">
                <img src="img/camisa01.webp" alt="Camiseta 1">
                <div class="descricao">
                    <h2>Camiseta Estampada</h2>
                    <p class="preço" data-preco="49.90">R$ 49,90</p>
                    <button class="add-cart">Adicionar ao carrinho</button>

                </div>

            </div>
        </div>
    </div>

    <!-- Toast container (aria-live para acessibilidade) -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <div class="carrinho-compras">
        <div class="carrinho-header">
            <h1>Carrinho de Compras</h1>
        </div>

        <!-- Lista de produtos -->
        <div class="lista-itens">
            <div class="produtos">
                <div class="imagem">
                    <img src="img/camisa01.webp" alt="Camiseta 1">
                </div>
                <div class="nome">
                    <h2>Camiseta Estampada</h2>
                </div>
                <div class="preço" data-preco="49.90">R$ 49,90</div>
                <div class="quantidade">
                    <span class="minus">-</span>
                    <span>1</span>
                    <span class="plus">+</span>
                </div>
            </div>
            <!-- outros produtos viriam aqui... -->
        </div>
        <div id="carrinho-vazio" class="carrinho-vazio">
            <p>Seu carrinho está vazio 😔</p>
            <p>Adicione alguns produtos!</p>
        </div>
        <div class="total-container">
            <button id="limpar-carrinho" class="btn-limpar">🗑 Limpar Carrinho</button>
            <strong>Valor Total:</strong>
            <span id="total-geral" class="total">R$ 0,00</span>
        </div>

        <!-- Botões fora da lista de produtos -->
        <div class="btn">
            <button class="fechar">Fechar Carrinho</button>
            <button class="finalizar">Finalizar Compra</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
